<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking - Color Sort Game (Strong Glow)</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { transform: scaleX(-1); display: none; }
        canvas { transform: scaleX(-1); width: 100%; height: 100%; object-fit: contain; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 32px; pointer-events: none; text-shadow: 2px 2px 4px #000; z-index: 20; }
        #score, #timer { margin-bottom: 10px; }
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff0; font-size: 32px; text-align: center; pointer-events: none; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; z-index: 10; }
    </style>
</head>
<body>
<div id="container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="ui"><div id="score">Score: 0</div><div id="timer">Time: 60</div></div>
    <div id="message">カメラ起動中...</div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreElement = document.getElementById('score'), timerElement = document.getElementById('timer'), messageElement = document.getElementById('message');

    let score = 0, gameStarted = false, startTime = 0, lastEndTime = 0;
    const cooldownTime = 3000, gameDuration = 60, ringRadius = 60;
    let audioCtx = null;

    const colorList = ['#FF0000', '#0000FF', '#FFFF00', '#FF69B4', '#FFA500'];
    let targets = [];
    let balls = [];
    let handGrabbed = [-1, -1]; 

    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        window.speechSynthesis.speak(uttr);
    }

    function playCatchSound() {
        initAudioContext();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.start();
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
        osc.stop(audioCtx.currentTime + 0.15);
    }

    function generateTargets() {
        targets = [];
        const spacing = canvasElement.width / 6;
        for (let i = 0; i < 5; i++) {
            targets.push({
                x: spacing * (i + 1),
                y: 100,
                radius: 60,
                color: colorList[i]
            });
        }
    }

    function generateNewBalls() {
        balls = [];
        const shuffledColors = [...colorList].sort(() => Math.random() - 0.5);
        for (let i = 0; i < 5; i++) {
            balls.push({
                x: Math.random() * (canvasElement.width - 200) + 100,
                y: Math.random() * (canvasElement.height - 350) + 250,
                radius: 45,
                color: '#00FF00',
                targetColor: shuffledColors[i],
                isRevealed: false,
                isPlaced: false
            });
        }
    }

    function onResults(results) {
        canvasElement.width = videoElement.videoWidth; 
        canvasElement.height = videoElement.videoHeight;
        
        if (targets.length === 0 || targets[0].x !== canvasElement.width / 6) {
            generateTargets();
        }

        canvasCtx.save(); 
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        
        let now = Date.now();

        // --- ターゲット描画 ---
        targets.forEach(t => {
            canvasCtx.beginPath();
            canvasCtx.arc(t.x, t.y, t.radius, 0, 2 * Math.PI);
            canvasCtx.strokeStyle = t.color;
            canvasCtx.lineWidth = 10;
            canvasCtx.stroke();
        });

        let ballsInteracting = new Set();

        // --- 手の認識ロジック ---
        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                if (index > 1) return;
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
                
                const hx = landmarks[9].x * canvasElement.width;
                const hy = landmarks[9].y * canvasElement.height;
                
                const isBentNow = Math.hypot(landmarks[9].x - landmarks[12].x, landmarks[9].y - landmarks[12].y) < (Math.hypot(landmarks[0].x - landmarks[9].x, landmarks[0].y - landmarks[9].y) * 0.6);
                
                canvasCtx.beginPath(); 
                canvasCtx.arc(hx, hy, ringRadius, 0, 2 * Math.PI);
                canvasCtx.strokeStyle = isBentNow ? '#FFF' : '#FF0';
                canvasCtx.lineWidth = 6; 
                canvasCtx.stroke();

                if (!gameStarted) {
                    if (now - lastEndTime > cooldownTime && landmarks[9].y < 0.3) {
                        initAudioContext(); 
                        gameStarted = true; score = 0; startTime = now; 
                        messageElement.style.display = 'none'; 
                        speak("スタート"); 
                        generateNewBalls();
                    }
                } else {
                    if (!isBentNow) { 
                        handGrabbed[index] = -1;
                        balls.forEach((ball, bIdx) => {
                            if (!ball.isPlaced) {
                                if (Math.hypot(hx - ball.x, hy - ball.y) < ringRadius + ball.radius) {
                                    ball.isRevealed = true;
                                    ballsInteracting.add(bIdx);
                                }
                            }
                        });
                    } else { 
                        if (handGrabbed[index] !== -1) {
                            const bIdx = handGrabbed[index];
                            const ball = balls[bIdx];
                            if (!ball.isPlaced) {
                                ball.x = hx; ball.y = hy;
                                ballsInteracting.add(bIdx);
                                const matchingTarget = targets.find(t => t.color === ball.targetColor);
                                if (matchingTarget && Math.hypot(ball.x - matchingTarget.x, ball.y - matchingTarget.y) < 90) {
                                    ball.x = matchingTarget.x; ball.y = matchingTarget.y;
                                    ball.isPlaced = true; handGrabbed[index] = -1;
                                    score++; playCatchSound();
                                }
                            }
                        } else {
                            balls.forEach((ball, bIdx) => {
                                if (!ball.isPlaced && ball.isRevealed) {
                                    if (Math.hypot(hx - ball.x, hy - ball.y) < ringRadius + ball.radius) {
                                        const otherHand = index === 0 ? 1 : 0;
                                        if (handGrabbed[otherHand] !== bIdx) {
                                            handGrabbed[index] = bIdx;
                                            ballsInteracting.add(bIdx);
                                        }
                                    }
                                }
                            });
                        }
                    }
                }
            });
        }

        // --- ボールの描画処理 ---
        if (gameStarted) {
            balls.forEach((ball, bIdx) => {
                if (!ball.isPlaced) {
                    if (!ballsInteracting.has(bIdx)) {
                        ball.isRevealed = false;
                        ball.color = '#00FF00';
                    } else {
                        ball.color = ball.targetColor;
                    }
                }

                const isBeingGrabbed = handGrabbed[0] === bIdx || handGrabbed[1] === bIdx;

                if (isBeingGrabbed) {
                    // 【強化版】多層グローエフェクト
                    canvasCtx.save();
                    // 1層目: 広く薄い輝き
                    canvasCtx.shadowBlur = 80;
                    canvasCtx.shadowColor = ball.color;
                    canvasCtx.beginPath();
                    canvasCtx.arc(ball.x, ball.y, ball.radius, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = ball.color;
                    canvasCtx.fill();

                    // 2層目: 狭く強い輝きを重ねる
                    canvasCtx.shadowBlur = 30;
                    canvasCtx.fill();
                    canvasCtx.restore();
                } else {
                    // 通常時（掴んでいないが色は見えている場合など）
                    canvasCtx.beginPath();
                    canvasCtx.arc(ball.x, ball.y, ball.radius, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = ball.color;
                    canvasCtx.fill();
                }
                
                // 共通の白い枠線
                canvasCtx.beginPath();
                canvasCtx.arc(ball.x, ball.y, ball.radius, 0, 2 * Math.PI);
                canvasCtx.shadowBlur = 0; 
                canvasCtx.strokeStyle = '#FFFFFF';
                canvasCtx.lineWidth = 3;
                canvasCtx.stroke();
            });

            if (balls.length > 0 && balls.every(b => b.isPlaced)) {
                speak("クリア");
                generateNewBalls();
            }

            const remaining = Math.max(0, gameDuration - Math.floor((now - startTime) / 1000));
            timerElement.innerText = `Time: ${remaining}`; 
            scoreElement.innerText = `Score: ${score}`;
            
            if (remaining <= 0) { 
                gameStarted = false; lastEndTime = now; 
                messageElement.style.display = 'block'; 
                messageElement.innerHTML = `終了！<br>${score}点です`; 
                speak(`${score}点です。終了。`); 
                balls = []; handGrabbed = [-1, -1];
            }
        } else if (now - lastEndTime > cooldownTime) { 
            messageElement.innerHTML = "START --- hand up<br><small>(どちらかの手を高く上げてください)</small>"; 
        }
        
        canvasCtx.restore();
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);
    
    const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 1280, height: 720 });
    window.onload = () => camera.start();
    window.addEventListener('click', () => { initAudioContext(); speak(""); }, { once: true });
</script>
</body>
</html>
