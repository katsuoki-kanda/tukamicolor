<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking - Compact & Clean Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { transform: scaleX(-1); display: none; }
        canvas { transform: scaleX(-1); width: 100%; height: 100%; object-fit: contain; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 28px; pointer-events: none; text-shadow: 2px 2px 4px #000; z-index: 20; }
        #score, #timer { margin-bottom: 8px; }
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff0; font-size: 32px; text-align: center; pointer-events: none; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; z-index: 10; }
    </style>
</head>
<body>
<div id="container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="ui"><div id="score">Score: 0</div><div id="timer">Time: 60</div></div>
    <div id="message">カメラ起動中...</div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreElement = document.getElementById('score'), timerElement = document.getElementById('timer'), messageElement = document.getElementById('message');

    let score = 0, gameStarted = false, startTime = 0, lastEndTime = 0;
    const cooldownTime = 3000, gameDuration = 60;
    
    // サイズ設定
    const ringRadius = 45; // リングを小さく
    const ballRadius = 30; // ボールを小さく
    
    let audioCtx = null;
    const colorList = ['#FF0000', '#0000FF', '#FFFF00', '#FF69B4', '#FFA500'];
    let targetColorsOrder = [...colorList];
    let targets = [];
    let balls = [];
    
    let handStates = {
        'Left': { ballIdx: -1, x: 0, y: 0, isFist: false, lostFrames: 0 },
        'Right': { ballIdx: -1, x: 0, y: 0, isFist: false, lostFrames: 0 }
    };
    const MAX_LOST_FRAMES = 12; 

    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        window.speechSynthesis.speak(uttr);
    }

    function playLockSound() {
        initAudioContext();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(1500, audioCtx.currentTime);
        osc.start();
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
        osc.stop(audioCtx.currentTime + 0.05);
    }

    function playCatchSound() {
        initAudioContext();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.start();
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
        osc.stop(audioCtx.currentTime + 0.15);
    }

    // 重なりを防ぐ配置関数
    function generateTargets(shuffle = false) {
        if (shuffle) targetColorsOrder.sort(() => Math.random() - 0.5);
        targets = [];
        const padding = 80;
        for (let i = 0; i < 5; i++) {
            let x, y, overlap;
            let attempts = 0;
            do {
                overlap = false;
                x = Math.random() * (canvasElement.width - padding * 2) + padding;
                y = Math.random() * (canvasElement.height - padding * 2 - 100) + padding;
                // 他のターゲットとの重なりチェック
                for (let t of targets) {
                    if (Math.hypot(x - t.x, y - t.y) < ringRadius * 2.5) { overlap = true; break; }
                }
                attempts++;
            } while (overlap && attempts < 100);
            targets.push({ x: x, y: y, radius: ringRadius, color: targetColorsOrder[i] });
        }
    }

    function generateNewBalls() {
        balls = [];
        const shuffledColors = [...colorList].sort(() => Math.random() - 0.5);
        const padding = 80;
        for (let i = 0; i < 5; i++) {
            let x, y, tooClose;
            let attempts = 0;
            do {
                tooClose = false;
                x = Math.random() * (canvasElement.width - padding * 2) + padding;
                y = Math.random() * (canvasElement.height - padding * 2 - 100) + padding;
                
                // ターゲットとの重なりチェック
                for (let t of targets) {
                    if (Math.hypot(x - t.x, y - t.y) < 110) { tooClose = true; break; }
                }
                // 他の出現中ボールとの重なりチェック
                for (let b of balls) {
                    if (Math.hypot(x - b.x, y - b.y) < ballRadius * 3) { tooClose = true; break; }
                }
                attempts++;
            } while (tooClose && attempts < 100);
            balls.push({ x: x, y: y, radius: ballRadius, color: '#00FF00', targetColor: shuffledColors[i], isRevealed: false, isPlaced: false });
        }
    }

    function onResults(results) {
        if (canvasElement.width !== videoElement.videoWidth) {
            canvasElement.width = videoElement.videoWidth; 
            canvasElement.height = videoElement.videoHeight;
            generateTargets(false);
            if (gameStarted) generateNewBalls();
        }

        canvasCtx.save(); 
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        
        let now = Date.now();

        // ターゲット描画
        targets.forEach(t => {
            canvasCtx.beginPath(); canvasCtx.arc(t.x, t.y, t.radius, 0, 2 * Math.PI);
            canvasCtx.strokeStyle = t.color; canvasCtx.lineWidth = 8; canvasCtx.stroke();
        });

        let currentActiveLabels = new Set();
        
        if (results.multiHandLandmarks && results.multiHandedness) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                const label = results.multiHandedness[index].label;
                currentActiveLabels.add(label);

                const hx = landmarks[9].x * canvasElement.width;
                const hy = landmarks[9].y * canvasElement.height;
                const isFist = Math.hypot(landmarks[9].x - landmarks[12].x, landmarks[9].y - landmarks[12].y) < (Math.hypot(landmarks[0].x - landmarks[9].x, landmarks[0].y - landmarks[9].y) * 0.65);
                
                handStates[label].x = hx;
                handStates[label].y = hy;
                handStates[label].isFist = isFist;
                handStates[label].lostFrames = 0;

                // ボール即時同期
                if (gameStarted && handStates[label].ballIdx !== -1) {
                    const bIdx = handStates[label].ballIdx;
                    balls[bIdx].x = hx;
                    balls[bIdx].y = hy;
                    balls[bIdx].isRevealed = true;
                }

                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: label === 'Left' ? '#00FFFF' : '#FFFF00', lineWidth: 2});
                
                if (!gameStarted && now - lastEndTime > cooldownTime && landmarks[9].y < 0.3) {
                    initAudioContext(); gameStarted = true; score = 0; startTime = now; 
                    messageElement.style.display = 'none'; speak("スタート"); 
                    generateTargets(true); generateNewBalls();
                }
            });
        }

        ['Left', 'Right'].forEach(label => {
            if (!currentActiveLabels.has(label)) {
                handStates[label].lostFrames++;
                if (handStates[label].lostFrames > MAX_LOST_FRAMES) handStates[label].ballIdx = -1;
            }
        });

        if (gameStarted) {
            balls.forEach(ball => { 
                if (!ball.isPlaced) {
                    let beingHeld = (handStates.Left.ballIdx !== -1 && balls[handStates.Left.ballIdx] === ball) || 
                                    (handStates.Right.ballIdx !== -1 && balls[handStates.Right.ballIdx] === ball);
                    if (!beingHeld) ball.isRevealed = false;
                }
            });

            ['Left', 'Right'].forEach(label => {
                const hand = handStates[label];
                if (hand.lostFrames > 0) return;

                if (hand.ballIdx === -1) {
                    balls.forEach((ball, bIdx) => {
                        if (ball.isPlaced) return;
                        const dist = Math.hypot(hand.x - ball.x, hand.y - ball.y);
                        // 掴み判定
                        if (dist < ringRadius + ball.radius) {
                            ball.isRevealed = true;
                            if (hand.isFist) {
                                const otherLabel = label === 'Left' ? 'Right' : 'Left';
                                if (handStates[otherLabel].ballIdx !== bIdx) {
                                    hand.ballIdx = bIdx;
                                    playLockSound();
                                }
                            }
                        }
                    });
                } else {
                    const ball = balls[hand.ballIdx];
                    const matchingTarget = targets.find(t => t.color === ball.targetColor);
                    // ターゲット吸い込み判定（サイズに合わせて縮小）
                    if (matchingTarget && Math.hypot(ball.x - matchingTarget.x, ball.y - matchingTarget.y) < 55) {
                        ball.x = matchingTarget.x; ball.y = matchingTarget.y;
                        ball.isPlaced = true; hand.ballIdx = -1;
                        score++; playCatchSound();
                    }
                }

                let ringCol = hand.isFist ? '#FFF' : (label === 'Left' ? '#00FFFF' : '#FFFF00');
                if (hand.ballIdx !== -1) ringCol = balls[hand.ballIdx].targetColor;
                canvasCtx.beginPath(); canvasCtx.arc(hand.x, hand.y, ringRadius, 0, 2 * Math.PI);
                canvasCtx.strokeStyle = ringCol; canvasCtx.lineWidth = 4; canvasCtx.stroke();
            });

            balls.forEach((ball, bIdx) => {
                const color = (ball.isRevealed || ball.isPlaced) ? ball.targetColor : '#00FF00';
                const isHeld = (handStates.Left.ballIdx === bIdx || handStates.Right.ballIdx === bIdx);

                canvasCtx.save();
                if (isHeld) {
                    canvasCtx.shadowBlur = 30; canvasCtx.shadowColor = color;
                }
                canvasCtx.beginPath(); canvasCtx.arc(ball.x, ball.y, ball.radius, 0, 2 * Math.PI);
                canvasCtx.fillStyle = color; canvasCtx.fill();
                canvasCtx.strokeStyle = '#FFFFFF'; canvasCtx.lineWidth = 2; canvasCtx.stroke();
                canvasCtx.restore();
            });

            if (balls.length > 0 && balls.every(b => b.isPlaced)) {
                speak("クリア"); generateTargets(true); generateNewBalls();
            }

            const remaining = Math.max(0, gameDuration - Math.floor((now - startTime) / 1000));
            timerElement.innerText = `Time: ${remaining}`; scoreElement.innerText = `Score: ${score}`;
            if (remaining <= 0) { 
                gameStarted = false; lastEndTime = now; 
                messageElement.style.display = 'block'; 
                messageElement.innerHTML = `終了！<br>${score}点です`; 
                speak(`${score}点です。終了。`); 
                balls = []; handStates.Left.ballIdx = -1; handStates.Right.ballIdx = -1;
            }
        } else if (now - lastEndTime > cooldownTime) { 
            messageElement.innerHTML = "START --- hand up<br><small>(手を高く上げてください)</small>"; 
        }
        canvasCtx.restore();
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.4, minTrackingConfidence: 0.4 });
    hands.onResults(onResults);
    
    const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 800, height: 450 });
    window.onload = () => camera.start();
    window.addEventListener('click', () => { initAudioContext(); speak(""); }, { once: true });
</script>
</body>
</html>
